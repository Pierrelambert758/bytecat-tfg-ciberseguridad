<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel interno - ByteCat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="admin-page">

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Panel interno</h2>

    <div>
        <a href="/admin/clientes" class="btn btn-outline-info me-2">
            👤 Clientes
        </a>

        <a href="/admin/pedidos" class="btn btn-outline-warning me-2">
            📦 Pedidos
        </a>

        <a href="/admin/catalogo" class="btn btn-primary">
            Editar catálogo
        </a>
    </div>
</div>

    <div class="admin-card mt-4">
        <h4>Usuarios web</h4>

        <table class="table table-dark table-hover mt-3">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user['username'] }}</td>
                    <td>{{ user['email'] }}</td>
                    <td><span class="role-badge">{{ user['role'] }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="admin-card mt-4">
        <h4>Notas internas</h4>

        {% for note in notes %}
        <div class="internal-note">
            <h5>{{ note['title'] }}</h5>
            <p>{{ note['content'] }}</p>
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('inicio') }}" class="btn btn-outline-light mt-4">Volver al inicio</a>

</div>

</body>
</html>
