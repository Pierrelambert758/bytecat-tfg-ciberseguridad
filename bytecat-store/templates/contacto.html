<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - ByteCat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="admin-page">

<div class="container mt-5 mb-5">

    <div class="admin-header">
        <div>
            <h2>Contacto</h2>
            <p>Formulario de contacto para clientes y consultas generales.</p>
        </div>

        <a href="{{ url_for('inicio') }}" class="btn btn-outline-light">Volver</a>
    </div>

    <div class="admin-card mt-4">

        <form method="POST">

            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Correo electrónico</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Teléfono</label>
                <input type="text" name="telefono" class="form-control">
            </div>

            <div class="mb-3">
                <label>Comentario</label>
                <textarea name="mensaje" class="form-control" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Enviar mensaje</button>

        </form>

    </div>

    {% if comentario %}
    <div class="admin-card mt-4">
        <h4>Mensaje recibido</h4>

        <p><strong>Nombre:</strong> {{ comentario.nombre }}</p>
        <p><strong>Email:</strong> {{ comentario.email }}</p>
        <p><strong>Teléfono:</strong> {{ comentario.telefono }}</p>

        <p><strong>Comentario:</strong></p>

        <div class="internal-note">
            {{ comentario.mensaje | safe }}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
