<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - ByteCat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-dark text-light">

<div class="container mt-5 mb-5">

    <h2 class="mb-3">Catálogo completo</h2>
    <p class="text-secondary">
        Descubre todos los productos disponibles en ByteCat Store.
    </p>

    <!-- 🛒 CARRITO -->
    <div class="catalog-cart-box mb-4">
        🛒 Carrito: <strong id="cart-count">0</strong>
    </div>

    <div class="row g-4 mt-4">

        {% for product in products %}
        <div class="col-md-4">

            <div class="product-card">

                <div class="product-body">

                    <span class="product-category">
                        {{ product['category'] }}
                    </span>

                    <h5 class="mt-2">{{ product['name'] }}</h5>

                    <p class="text-secondary">
                        {{ product['description'] }}
                    </p>

                    <div class="product-footer">
                        <strong class="price">{{ product['price'] }} €</strong>
                        <span class="stock">Stock: {{ product['stock'] }}</span>
                    </div>

                    <button 
                        class="btn btn-primary add-to-cart mt-3"
                        data-id="{{ product['id'] }}"
                        data-name="{{ product['name'] }}"
                        data-price="{{ product['price'] }}">
                        🛒 Añadir
                    </button>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

    <div class="text-center mt-5">
        <a href="{{ url_for('inicio') }}" class="btn btn-outline-light">
            Volver al inicio
        </a>
    </div>

</div>

<!-- 🧠 SCRIPT FUNCIONAL -->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount() {
    let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    localStorage.setItem("cartCount", totalItems);
    const counter = document.getElementById("cart-count");
    if (counter) counter.innerText = totalItems;
}

document.querySelectorAll(".add-to-cart").forEach(button => {
    button.addEventListener("click", function() {
        const id = this.dataset.id;
        const name = this.dataset.name;
        const price = parseFloat(this.dataset.price);

        const existing = cart.find(item => item.id === id);

        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id, name, price, quantity: 1 });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();

        this.innerText = "✔ Añadido";
        this.classList.remove("btn-primary");
        this.classList.add("btn-success");

        setTimeout(() => {
            this.innerText = "🛒 Añadir";
            this.classList.remove("btn-success");
            this.classList.add("btn-primary");
        }, 1500);
    });
});

updateCartCount();
</script>

</body>
</html>
