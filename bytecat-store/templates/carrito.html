<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito - ByteCat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-dark text-light">

<div class="container mt-5 mb-5">

    <h2>Carrito</h2>
    <p class="text-secondary">Resumen de productos seleccionados en ByteCat Store.</p>

    <div class="row mt-4">

        <div class="col-md-8">
            <div id="cart-items"></div>
        </div>

        <div class="col-md-4">
            <div class="checkout-box">
                <h4>Resumen</h4>

                <hr>

                <div class="d-flex justify-content-between">
                    <span>Subtotal</span>
                    <strong id="subtotal">0 €</strong>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <span>Coste de envío</span>
                    <strong>Gratis</strong>
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <span>Total</span>
                    <strong id="total">0 €</strong>
                </div>

                <h5 class="mt-4">Método de pago</h5>

                <select id="payment-method" class="form-control mt-2">
                    <option value="tarjeta">Tarjeta bancaria</option>
                    <option value="bizum">Bizum</option>
                    <option value="paypal">PayPal</option>
                </select>

                <!-- VULNERABILIDAD INTENCIONADA -->
                <div class="mt-3">
                    <label>Cupón descuento</label>
                    <input type="text" id="coupon" class="form-control" placeholder="Ej: BYTECAT10">
                    <button class="btn btn-outline-light mt-2 w-100" onclick="applyCoupon()">
                        Aplicar cupón
                    </button>
                </div>

                <button class="btn btn-primary w-100 mt-4" onclick="finishOrder()">
                    Tramitar pedido
                </button>

                <p class="text-secondary small mt-3">
                    Simulación de compra. No se realiza ningún pago real.
                </p>
            </div>
        </div>

    </div>

    <a href="{{ url_for('catalogo') }}" class="btn btn-outline-light mt-4">
        Seguir comprando
    </a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let discount = 0;

function renderCart() {
    const container = document.getElementById("cart-items");
    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="cart-empty">
                <h4>Tu carrito está vacío</h4>
                <p>Añade productos desde el catálogo.</p>
            </div>
        `;
        updateTotals();
        return;
    }

    cart.forEach((item, index) => {
        container.innerHTML += `
            <div class="cart-item">
                <div>
                    <h5>${item.name}</h5>
                    <p>Precio unidad: ${item.price.toFixed(2)} €</p>
                    <p>Cantidad: ${item.quantity}</p>
                </div>

                <div class="cart-actions">
                    <button onclick="changeQuantity(${index}, -1)" class="btn btn-outline-light btn-sm">-</button>
                    <button onclick="changeQuantity(${index}, 1)" class="btn btn-outline-light btn-sm">+</button>
                    <button onclick="removeItem(${index})" class="btn btn-danger btn-sm">Eliminar</button>
                </div>
            </div>
        `;
    });

    updateTotals();
}

function updateTotals() {
    let subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    let total = subtotal - discount;

    if (total < 0) total = 0;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2) + " €";
    document.getElementById("total").innerText = total.toFixed(2) + " €";
}

function changeQuantity(index, amount) {
    cart[index].quantity += amount;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("cartCount", cart.reduce((sum, item) => sum + item.quantity, 0));
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("cartCount", cart.reduce((sum, item) => sum + item.quantity, 0));
    renderCart();
}

/*
VULNERABILIDAD INTENCIONADA:
El cupón se valida en cliente, por lo que un atacante puede manipularlo desde el navegador.
*/
function applyCoupon() {
    const coupon = document.getElementById("coupon").value;

    if (coupon === "BYTECAT10") {
        discount = 10;
        alert("Cupón aplicado: 10 € de descuento");
    }

    if (coupon === "ADMIN100") {
        discount = 100;
        alert("Cupón interno aplicado: 100 € de descuento");
    }

    updateTotals();
}

function finishOrder() {
    const method = document.getElementById("payment-method").value;
    alert("Pedido simulado realizado mediante " + method);
}

renderCart();
</script>

</body>
</html>
